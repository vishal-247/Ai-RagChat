<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --panel:     #1a1a1f;
      --border:    #2a2a32;
      --border2:   #38383f;
      --text:      #e8e6e0;
      --muted:     #7a7870;
      --accent:    #c8a96e;
      --accent2:   #7ec8a9;
      --danger:    #c86e7e;
      --user-bg:   #1f1d28;
      --bot-bg:    #161a1d;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); font-style: normal; }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 20px;
    }
    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-section {
      padding: 18px 18px 10px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    /* Drop zone */
    .drop-zone {
      margin: 16px;
      border: 1.5px dashed var(--border2);
      border-radius: 6px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,169,110,.05);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .drop-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: .6;
    }
    .drop-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }
    .drop-label strong { color: var(--accent); }

    /* Upload progress */
    .upload-progress {
      margin: 0 16px 12px;
      display: none;
    }
    .upload-progress.visible { display: block; }
    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .3s;
      border-radius: 2px;
    }
    .progress-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* Doc list */
    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }
    .doc-list::-webkit-scrollbar { width: 4px; }
    .doc-list::-webkit-scrollbar-track { background: transparent; }
    .doc-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 5px;
      margin-bottom: 3px;
      transition: background .15s;
      animation: slideIn .25s ease both;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
    .doc-item:hover { background: var(--panel); }
    .doc-icon { font-size: 16px; flex-shrink: 0; }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }
    .doc-size { color: var(--muted); font-size: 10px; margin-top: 2px; }
    .doc-delete {
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 3px;
      font-size: 14px;
      line-height: 1;
      transition: color .15s, background .15s;
      opacity: 0;
    }
    .doc-item:hover .doc-delete { opacity: 1; }
    .doc-delete:hover { color: var(--danger); background: rgba(200,110,126,.1); }

    .empty-docs {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 24px 12px;
      line-height: 1.7;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .msg-row {
      display: flex;
      gap: 14px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-row.user .msg-avatar {
      background: var(--user-bg);
      border: 1px solid var(--border2);
    }
    .msg-row.bot .msg-avatar {
      background: rgba(200,169,110,.12);
      border: 1px solid rgba(200,169,110,.25);
    }

    .msg-bubble {
      max-width: 68%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.7;
      font-size: 13px;
    }
    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--border2);
      color: var(--text);
    }
    .msg-row.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }
    .msg-row.user .msg-meta { text-align: right; }

    .sources-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-tag {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      background: rgba(126,200,169,.08);
      border: 1px solid rgba(126,200,169,.2);
      color: var(--accent2);
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      padding: 10px 14px;
    }
    .thinking-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: .2s; }
    .thinking-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
      text-align: center;
      opacity: 0.6;
    }
    .welcome-icon { font-size: 42px; }
    .welcome h2 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 24px;
      color: var(--text);
    }
    .welcome p { color: var(--muted); max-width: 320px; line-height: 1.7; font-size: 12px; }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
    }
    #chat-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 6px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all .2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #d4b87a; transform: scale(1.05); }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid;
      animation: toastIn .25s ease;
      max-width: 300px;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .toast.success { background: rgba(126,200,169,.1); border-color: rgba(126,200,169,.3); color: var(--accent2); }
    .toast.error { background: rgba(200,110,126,.1); border-color: rgba(200,110,126,.3); color: var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="logo">RAG <span>Studio</span></div>
  <div class="status-pill">
    <span class="dot"></span>
    <span id="status-text">Ready</span>
  </div>
</header>

<div class="workspace">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">Knowledge Base</div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf" multiple />
      <div class="drop-icon">📄</div>
      <div class="drop-label">
        <strong>Drop PDFs here</strong><br>or click to browse
      </div>
    </div>

    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">Uploading…</div>
    </div>

    <div class="doc-list" id="doc-list">
      <div class="empty-docs" id="empty-docs">
        No documents yet.<br>Upload PDFs to begin.
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🔍</div>
        <h2>Ask your documents</h2>
        <p>Upload PDFs to the knowledge base, then ask anything. Your RAG pipeline will retrieve relevant chunks and answer with context.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Ask a question about your documents…"
        ></textarea>
      </div>
      <button class="send-btn" id="send-btn" title="Send">➤</button>
    </div>
  </main>

</div>

<div class="toast-container" id="toast-container"></div>

<script>
  const messagesEl  = document.getElementById('messages');
  const chatInput   = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('send-btn');
  const docList     = document.getElementById('doc-list');
  const emptyDocs   = document.getElementById('empty-docs');
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const progressEl  = document.getElementById('upload-progress');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const statusText  = document.getElementById('status-text');
  const welcomeEl   = document.getElementById('welcome');

  let chatHistory = [];
  let documents   = [];

  // ── Auto-resize textarea ──
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Toast ──
  function toast(msg, type = 'success', duration = 3500) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), duration);
  }

  // ── Drag & drop ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    [...e.dataTransfer.files].forEach(uploadFile);
  });
  fileInput.addEventListener('change', () => {
    [...fileInput.files].forEach(uploadFile);
    fileInput.value = '';
  });

  // ── Upload ──
  async function uploadFile(file) {
    if (!file.name.endsWith('.pdf')) { toast('Only PDF files are supported.', 'error'); return; }

    progressEl.classList.add('visible');
    progressBar.style.width = '0%';
    progressLbl.textContent = `Uploading ${file.name}…`;
    statusText.textContent = 'Uploading…';

    // Fake progress animation
    let prog = 0;
    const tick = setInterval(() => {
      prog = Math.min(prog + Math.random() * 18, 85);
      progressBar.style.width = prog + '%';
    }, 150);

    const fd = new FormData();
    fd.append('file', file);

    try {
      const res  = await fetch('/upload', { method: 'POST', body: fd });
      const data = await res.json();
      clearInterval(tick);

      if (data.success) {
        progressBar.style.width = '100%';
        progressLbl.textContent = 'Upload complete!';
        documents.push(data.document);
        renderDocs();
        toast(`"${data.document.name}" added to knowledge base.`);
        setTimeout(() => { progressEl.classList.remove('visible'); progressBar.style.width = '0%'; }, 1200);
        statusText.textContent = `${documents.length} doc${documents.length > 1 ? 's' : ''} loaded`;
      } else {
        throw new Error(data.error || 'Upload failed');
      }
    } catch (err) {
      clearInterval(tick);
      progressEl.classList.remove('visible');
      toast(err.message, 'error');
      statusText.textContent = 'Upload error';
    }
  }

  // ── Render doc list ──
  function renderDocs() {
    emptyDocs.style.display = documents.length ? 'none' : 'block';
    [...docList.querySelectorAll('.doc-item')].forEach(el => el.remove());

    documents.forEach(doc => {
      const item = document.createElement('div');
      item.className = 'doc-item';
      item.innerHTML = `
        <span class="doc-icon">📑</span>
        <div class="doc-info">
          <div class="doc-name" title="${doc.name}">${doc.name}</div>
          <div class="doc-size">${formatBytes(doc.size)}</div>
        </div>
        <button class="doc-delete" title="Remove" data-id="${doc.id}">✕</button>
      `;
      item.querySelector('.doc-delete').addEventListener('click', () => deleteDoc(doc.id));
      docList.appendChild(item);
    });
  }

  async function deleteDoc(id) {
    try {
      const res = await fetch(`/documents/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        documents = documents.filter(d => d.id !== id);
        renderDocs();
        statusText.textContent = documents.length ? `${documents.length} doc${documents.length > 1 ? 's' : ''} loaded` : 'Ready';
        toast('Document removed.', 'success');
      }
    } catch { toast('Failed to remove document.', 'error'); }
  }

  // ── Chat ──
  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    welcomeEl.remove();

    chatInput.value = '';
    chatInput.style.height = 'auto';
    sendBtn.disabled = true;
    statusText.textContent = 'Thinking…';

    appendMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    // Thinking bubble
    const thinkId = appendThinking();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory }),
      });
      const data = await res.json();

      removeThinking(thinkId);

      if (data.reply) {
        appendMessage('bot', data.reply, data.sources || []);
        chatHistory.push({ role: 'assistant', content: data.reply });
        statusText.textContent = documents.length ? `${documents.length} doc${documents.length > 1 ? 's' : ''} loaded` : 'Ready';
      } else {
        throw new Error(data.error || 'No reply received');
      }
    } catch (err) {
      removeThinking(thinkId);
      appendMessage('bot', `⚠ Error: ${err.message}`);
      statusText.textContent = 'Error';
    }

    sendBtn.disabled = false;
    scrollBottom();
  }

  function appendMessage(role, text, sources = []) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = role === 'user' ? '👤' : '🤖';
    const time   = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    let sourcesHtml = '';
    if (sources.length) {
      sourcesHtml = `<div class="sources-list">${sources.map(s =>
        `<span class="source-tag">📎 ${s}</span>`).join('')}</div>`;
    }

    row.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div>
        <div class="msg-bubble">${escHtml(text)}${sourcesHtml}</div>
        <div class="msg-meta">${time}</div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  let thinkCounter = 0;
  function appendThinking() {
    const id = `think-${thinkCounter++}`;
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = id;
    row.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble" style="padding:10px 14px">
        <div class="thinking">
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeThinking(id) {
    document.getElementById(id)?.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  // Load existing docs on page open
  (async () => {
    try {
      const res  = await fetch('/documents');
      const data = await res.json();
      if (data.documents?.length) {
        documents = data.documents;
        renderDocs();
        statusText.textContent = `${documents.length} doc${documents.length > 1 ? 's' : ''} loaded`;
      }
    } catch {}
  })();
</script>
</body>
</html>
